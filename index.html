<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECAR PRO - Self-Evolving AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c1c;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #5b67ea;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e2139;
            padding: 20px;
            border-radius: 12px;
        }
        .habits-section, .insights-section {
            background: #1e2139;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .habit-card {
            background: #252a41;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }
        .complete-btn {
            background: #2ecc71;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            margin-left: auto;
        }
        .badge {
            background: #2ecc71;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-left: 10px;
        }
        .nav {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            padding: 10px;
            background: #14172b;
            border-radius: 8px;
        }
        .nav-item {
            padding: 8px 16px;
            cursor: pointer;
            color: #8d93b5;
        }
        .nav-item.active {
            background: #5b67ea;
            color: white;
            border-radius: 6px;
        }
        .context-badge {
            background: #1e2139;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">⚡ SECAR PRO</div>
        <div>AI Learning Active 🤖</div>
    </div>

    <div class="nav" id="nav">
        <div class="nav-item active" onclick="showPage('dashboard')">Dashboard</div>
        <div class="nav-item" onclick="showPage('analytics')">Analytics</div>
        <div class="nav-item" onclick="showPage('habits')">Habits</div>
        <div class="nav-item" onclick="showPage('achievements')">Achievements</div>
        <div class="nav-item" onclick="showPage('insights')">Insights</div>
    </div>

    <div id="mainContent"></div>

    <script>
        // Simple working version
        let currentPage = 'dashboard';
        
        const rules = [
            { id: 1, name: 'Morning Run', icon: '🏃', time: '7:00', learned: '18:00', streak: 5, success: 85 },
            { id: 2, name: 'Read Books', icon: '📚', time: '21:00', learned: '22:00', streak: 3, success: 72 },
            { id: 3, name: 'Meditate', icon: '🧘', time: '8:00', learned: null, streak: 2, success: 68 },
            { id: 4, name: 'Drink Water', icon: '💧', time: null, learned: null, streak: 7, success: 92 },
        ];

        function getGreeting() {
            const hour = new Date().getHours();
            if (hour < 12) return 'Morning';
            if (hour < 17) return 'Afternoon';
            return 'Evening';
        }

        function getFormattedDate() {
            return new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        }

        function loadDashboard() {
            return `
                <div style="margin-bottom: 20px;">
                    <h1>Good ${getGreeting()}</h1>
                    <div style="color: #8d93b5;">${getFormattedDate()}</div>
                    <div style="margin-top: 10px;">
                        <span class="context-badge">🌙 Evening</span>
                        <span class="context-badge">📅 Weekday</span>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card"><h3>Total Habits</h3><p style="font-size: 24px;">${rules.length}</p></div>
                    <div class="stat-card"><h3>Done Today</h3><p style="font-size: 24px;">3</p></div>
                    <div class="stat-card"><h3>Best Streak</h3><p style="font-size: 24px;">7</p></div>
                    <div class="stat-card"><h3>Learned Rules</h3><p style="font-size: 24px;">2</p></div>
                    <div class="stat-card"><h3>Success Rate</h3><p style="font-size: 24px;">79%</p></div>
                </div>

                <div class="habits-section">
                    <h2 style="margin-bottom: 15px;">Today's Habits</h2>
                    ${rules.map(rule => `
                        <div class="habit-card">
                            <div style="font-size: 24px; margin-right: 15px;">${rule.icon}</div>
                            <div style="flex: 1;">
                                <div style="font-weight: 600;">${rule.name}</div>
                                ${rule.learned ? 
                                    `<div style="font-size: 12px; color: #8d93b5;"><span style="text-decoration: line-through;">${rule.time}</span> → <span style="color: #2ecc71;">${rule.learned}</span></div>` : 
                                    `<div style="font-size: 12px; color: #8d93b5;">Learning pattern...</div>`
                                }
                                <div style="margin-top: 5px;">
                                    ${rule.learned ? 
                                        '<span class="badge" style="background: #2ecc71;">✓ AI Optimized</span>' : 
                                        '<span class="badge" style="background: #f1c40f;">⏳ Learning 70%</span>'
                                    }
                                </div>
                            </div>
                            <div style="text-align: right; margin-right: 15px;">
                                <div>🔥${rule.streak}</div>
                                <div style="color: #2ecc71;">${rule.success}%</div>
                            </div>
                            <button class="complete-btn" onclick="alert('Habit completed! AI is learning...')">✓</button>
                        </div>
                    `).join('')}
                </div>

                <div class="insights-section">
                    <h2>Quick Insights</h2>
                    <div style="margin-top: 15px;">
                        <div style="background: #252a41; padding: 15px; border-radius: 8px; margin-bottom: 10px;">
                            <div style="font-size: 20px;">🧠</div>
                            <div style="font-weight: 600;">Learning Pattern</div>
                            <div style="color: #5b67ea;">You're most productive in evenings</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function loadAnalytics() {
            return `<div class="habits-section"><h2>Analytics Dashboard</h2><p>Track your progress here...</p></div>`;
        }

        function loadHabits() {
            return `<div class="habits-section"><h2>Habit Manager</h2><p>Manage all your habits...</p></div>`;
        }

        function loadAchievements() {
            return `<div class="habits-section"><h2>Achievements</h2><p>Unlock badges as you progress...</p></div>`;
        }

        function loadInsights() {
            return `<div class="habits-section"><h2>AI Insights</h2><p>Personalized recommendations...</p></div>`;
        }

        function showPage(page) {
            currentPage = page;
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.textContent.toLowerCase().includes(page)) {
                    item.classList.add('active');
                }
            });

            const content = document.getElementById('mainContent');
            switch(page) {
                case 'dashboard': content.innerHTML = loadDashboard(); break;
                case 'analytics': content.innerHTML = loadAnalytics(); break;
                case 'habits': content.innerHTML = loadHabits(); break;
                case 'achievements': content.innerHTML = loadAchievements(); break;
                case 'insights': content.innerHTML = loadInsights(); break;
            }
        }

        // Initialize
        showPage('dashboard');
        document.getElementById('todayStats').textContent = `0/${rules.length} habits`;
    </script>
</body>
</html>
